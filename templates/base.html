<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}mcptools.xin{% endblock %}</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="{% block description %}mcptools.xin - 提供高质量的MCP工具集合和公开API服务{% endblock %}">
    <meta name="keywords" content="{% block keywords %}MCP工具,Python工具,API服务,在线工具,开发者工具{% endblock %}">
    <meta name="author" content="mcptools.xin">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}mcptools.xin - MCP工具集合{% endblock %}">
    <meta property="og:description" content="{% block og_description %}提供高质量的MCP工具集合和公开API服务{% endblock %}">
    <meta property="og:url" content="https://mcptools.xin{% block og_url %}{% endblock %}">
    <meta property="og:image" content="https://mcptools.xin/static/og-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}mcptools.xin - MCP工具集合{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}提供高质量的MCP工具集合和公开API服务{% endblock %}">
    <meta name="twitter:image" content="https://mcptools.xin/static/og-image.png">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://mcptools.xin{% block canonical_url %}{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-gray-50 min-h-screen">
    <nav class="bg-white shadow-sm border-b">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <a href="/" class="text-xl font-bold text-gray-900">mcptools.xin</a>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="/tools" class="text-gray-600 hover:text-gray-900">工具列表</a>
                    <a href="/docs" class="text-gray-600 hover:text-gray-900">API文档</a>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="bg-white border-t mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-6">
            <p class="text-center text-gray-500 text-sm">
                © 2026 mcptools.xin - MCP工具集合
            </p>
        </div>
    </footer>
</body>
</html>
