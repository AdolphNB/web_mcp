<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}奇点临近 - 深圳市奇点临近计算机技术研发有限责任公司{% endblock %}</title>

    <!-- SEO Meta Tags -->
    <meta name="description" content="{% block description %}深圳市奇点临近计算机技术研发有限责任公司，专注计算机技术研发与人工智能创新{% endblock %}">
    <meta name="keywords" content="{% block keywords %}奇点临近,计算机技术,人工智能,MCP工具,技术研发,深圳{% endblock %}">
    <meta name="author" content="奇点临近">

    <!-- Open Graph / Social Media -->
    <meta property="og:type" content="website">
    <meta property="og:title" content="{% block og_title %}奇点临近 - 计算机技术研发{% endblock %}">
    <meta property="og:description" content="{% block og_description %}专注计算机技术研发与人工智能创新，提供高质量的MCP工具集合{% endblock %}">
    <meta property="og:url" content="https://mcptools.xin{% block og_url %}{% endblock %}">
    <meta property="og:image" content="https://mcptools.xin/static/og-image.png">

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="{% block twitter_title %}奇点临近 - 计算机技术研发{% endblock %}">
    <meta name="twitter:description" content="{% block twitter_description %}专注计算机技术研发与人工智能创新，提供高质量的MCP工具集合{% endblock %}">
    <meta name="twitter:image" content="https://mcptools.xin/static/og-image.png">

    <!-- Canonical URL -->
    <link rel="canonical" href="https://mcptools.xin{% block canonical_url %}{% endblock %}">

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
        body { font-family: 'Inter', sans-serif; }
        {% block extra_css %}{% endblock %}
</head>
    <body class="bg-black min-h-screen">
    <nav class="bg-black/80 backdrop-blur-md border-b border-cyan-500/30 fixed w-full top-0 z-50">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-16">
                <div class="flex items-center space-x-3">
                    <a href="/" class="flex items-center space-x-3">
                        <img src="/res/log.png" alt="Logo" class="h-10 w-10 object-contain">
                        <span class="text-xl font-bold text-cyan-400 tracking-wider">奇点临近</span>
                    </a>
                </div>
                <div class="flex items-center space-x-8">
                    <a href="/" class="text-cyan-300/80 hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(34,211,238,0.6)] transition-all duration-300 font-medium">首页</a>
                    <a href="/tools" class="text-cyan-300/80 hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(34,211,238,0.6)] transition-all duration-300 font-medium">产品</a>
                    <a href="/services" class="text-cyan-300/80 hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(34,211,238,0.6)] transition-all duration-300 font-medium">服务</a>
                    <a href="/docs" class="text-cyan-300/80 hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(34,211,238,0.6)] transition-all duration-300 font-medium">文档</a>
                    <a href="/about" class="text-cyan-300/80 hover:text-cyan-400 hover:drop-shadow-[0_0_8px_rgba(34,211,238,0.6)] transition-all duration-300 font-medium">关于我们</a>
                </div>
            </div>
        </div>
    </nav>
    
    <main class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 pt-24 pb-8">
        {% block content %}{% endblock %}
    </main>
    
    <footer class="bg-gray-900 border-t border-cyan-500/20 mt-12">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
            <div class="text-center">
                <p class="text-gray-400 text-sm mb-2">
                    © 2026 奇点临近 - 深圳市奇点临近计算机技术研发有限责任公司
                </p>
                <p class="text-cyan-400/60 text-xs mb-2">探索技术边界，驱动创新未来</p>
                <p class="text-gray-500 text-xs">
                    <a href="https://beian.miit.gov.cn" target="_blank" rel="noopener noreferrer" class="hover:text-cyan-400 transition-colors">
                        桂ICP备2025077760号
                    </a>
                </p>
            </div>
        </div>
    </footer>
</body>
</html>
